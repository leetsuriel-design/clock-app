<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>לומדים שעון</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body style="margin:0">
<div id="root"></div>

<script type="text/babel">

function speak(text){
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "he-IL";
  window.speechSynthesis.speak(msg);
}

function Clock({ hour, minute }) {
  const minuteDeg = minute * 6;
  const hourDeg = (hour % 12) * 30 + minute * 0.5;

  return (
    <div style={{position:"relative",width:260,height:260,border:"6px solid #6aa9ff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:"#fff"}}>
      {[...Array(12)].map((_, i) => (
        <div key={i} style={{position:"absolute",transform:`rotate(${i*30}deg) translate(0,-110px) rotate(-${i*30}deg)`}}>
          {i===0?12:i}
        </div>
      ))}
      <div style={{position:"absolute",bottom:"50%",left:"50%",width:6,height:70,background:"#333",transform:`translateX(-50%) rotate(${hourDeg}deg)`,transformOrigin:"bottom"}} />
      <div style={{position:"absolute",bottom:"50%",left:"50%",width:4,height:100,background:"#ff7a7a",transform:`translateX(-50%) rotate(${minuteDeg}deg)`,transformOrigin:"bottom"}} />
    </div>
  );
}

function App(){
  const [hour,setHour]=React.useState(3);
  const [minute,setMinute]=React.useState(0);

  const randomTime=()=>{
    const h=Math.floor(Math.random()*12)||12;
    const m=[0,15,30,45][Math.floor(Math.random()*4)];
    setHour(h);
    setMinute(m);
    speak("מה השעה?");
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#eef5ff"}}>
      <h2>⏰ לומדים שעון</h2>
      <Clock hour={hour} minute={minute}/>
      <button onClick={randomTime}>🎲 שאלה</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
