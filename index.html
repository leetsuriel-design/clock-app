<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>לומדים שעון</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body style="margin:0">
<div id="root"></div>

<script type="text/babel">

function speak(text){
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "he-IL";
  window.speechSynthesis.speak(msg);
}

function Clock({ hour, minute }) {
  const minuteDeg = minute * 6;
  const hourDeg = (hour % 12) * 30 + minute * 0.5;

  return (
    <div style={{position:"relative",width:260,height:260,border:"6px solid #6aa9ff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:"#fff"}}>
      {[...Array(12)].map((_, i) => (
        <div key={i} style={{position:"absolute",transform:`rotate(${i*30}deg) translate(0,-110px) rotate(-${i*30}deg)`}}>
          {i===0?12:i}
        </div>
      ))}
      <div style={{position:"absolute",bottom:"50%",left:"50%",width:6,height:70,background:"#333",transform:`translateX(-50%) rotate(${hourDeg}deg)`,transformOrigin:"bottom"}} />
      <div style={{position:"absolute",bottom:"50%",left:"50%",width:4,height:100,background:"#ff7a7a",transform:`translateX(-50%) rotate(${minuteDeg}deg)`,transformOrigin:"bottom"}} />
    </div>
  );
}

function App(){
  const [hour,setHour]=React.useState(3);
  const [minute,setMinute]=React.useState(0);

  // בנק שעות עם משקלים
  const [timeBank,setTimeBank]=React.useState([
    {time:"3:00",weight:1},
    {time:"6:30",weight:1},
    {time:"9:00",weight:1}
  ]);

  const [newTime,setNewTime]=React.useState("");

  const addTime=()=>{
    if(newTime && !timeBank.find(t=>t.time===newTime)){
      setTimeBank([...timeBank,{time:newTime,weight:1}]);
      setNewTime("");
    }
  };

  const removeTime=(t)=>{
    setTimeBank(timeBank.filter(x=>x.time!==t));
  };

  const updateWeight=(index,value)=>{
    const copy=[...timeBank];
    copy[index].weight=Number(value);
    setTimeBank(copy);
  };

  const randomWeighted=()=>{
    const total=timeBank.reduce((sum,t)=>sum+t.weight,0);
    let r=Math.random()*total;

    for(let t of timeBank){
      if(r < t.weight) return t.time;
      r -= t.weight;
    }
    return timeBank[0].time;
  };

  const randomTime=()=>{
    if(timeBank.length===0) return;
    const t=randomWeighted();
    const [h,m]=t.split(":");
    setHour(Number(h));
    setMinute(Number(m));
    speak("מה השעה?");
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20,padding:20,background:"linear-gradient(135deg,#e0f0ff,#fef6ff)",minHeight:"100vh"}}>
      <h2>⏰ לומדים שעון</h2>

      <Clock hour={hour} minute={minute}/>

      <button onClick={randomTime} style={{padding:10,background:"#6aa9ff",color:"white",border:"none",borderRadius:8}}>🎲 מה השעה?</button>

      <div style={{marginTop:20,width:300}}>
        <h3>🎯 בנק שעות + משקלים</h3>

        <input
          placeholder="לדוגמה 3:30"
          value={newTime}
          onChange={e=>setNewTime(e.target.value)}
        />
        <button onClick={addTime} style={{marginLeft:10}}>➕ הוסף</button>

        <div style={{marginTop:10}}>
          {timeBank.map((t,i)=>(
            <div key={t.time} style={{marginBottom:10,borderBottom:"1px solid #ddd",paddingBottom:5}}>
              <div>
                {t.time} 
                <button onClick={()=>removeTime(t.time)}>❌</button>
              </div>
              <input
                type="range"
                min="0"
                max="5"
                value={t.weight}
                onChange={e=>updateWeight(i,e.target.value)}
              />
              <span> משקל: {t.weight}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
